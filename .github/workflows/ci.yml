name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  python-and-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          if [ -s requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Compile Python modules
        run: python -m compileall src

      - name: Run full lab
        run: python -m src.main

      - name: Run individual sections
        run: |
          python -m src.main --section baseline
          python -m src.main --section redaction
          python -m src.main --section anonymization
          python -m src.main --section pseudonymization
          python -m src.main --section tde

      - name: Build Docker image
        run: docker build -t lab-protecao-dados .

      - name: Run Docker image
        run: docker run --rm lab-protecao-dados
